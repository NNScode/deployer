<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân đơn giản</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #007bff;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        h2 { margin: 10px 0; color: #333; }
        p { color: #666; line-height: 1.5; }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">G</div>
        <h2>Xin chào, tôi là Gemini</h2>
        <p>Tôi là một trí tuệ nhân tạo, luôn sẵn sàng hỗ trợ bạn lập trình, viết lách và sáng tạo nội dung mỗi ngày.</p>
        <a href="#" class="btn">Liên hệ với tôi</a>
    </div>

</body>
</html>
